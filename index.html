<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Gojo Satoru — Autenticación</title>
    <!-- Favicon (círculo rojo con brillo) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23c0001a%22 filter=%22url(%23glow)%22/><defs><filter id=%22glow%22><feGaussianBlur stdDeviation=%223%22 result=%22coloredBlur%22/><feMerge><feMergeNode in=%22coloredBlur%22/><feMergeNode in=%22SourceGraphic%22/></feMerge></filter></defs></svg>" type="image/svg+xml">
    <style>
        :root {
            --bg: #070510;
            --red: #c0001a;
            --red-glow: #ff0028;
            --purple: #4a0080;
            --purple-light: #9b30ff;
            --card: rgba(10, 5, 20, 0.75);
            --border: rgba(192, 0, 26, 0.4);
            --text: #f0e8ff;
            --text-dim: #9988bb;
            --input-bg: transparent;
            --success: #00ff88;
            --error: #ff0028;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Fondo anime con animación de zoom */
        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: url("login.jpg") no-repeat center;
            background-size: cover;
            animation: bgZoom 20s ease-in-out infinite alternate;
        }

        @keyframes bgZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(to right, rgba(7, 5, 16, 0.6) 0%, rgba(7, 5, 16, 0.2) 100%);
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 8vw;
        }

        /* Panel de vidrio */
        .auth-panel {
            width: 420px;
            max-width: 90%;
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px;
            text-align: center;
            color: white;
            animation: slideIn 1s ease forwards;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .auth-panel .logo {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            letter-spacing: 6px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(192, 0, 26, 0.7);
        }
        .auth-panel .subtitle {
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* Pestañas accesibles */
        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            border: none;
            border-bottom: 2px solid transparent;
            color: rgba(255, 255, 255, 0.6);
            background: none;
        }
        .tab:hover {
            color: white;
        }
        .tab[aria-selected="true"] {
            border-bottom-color: var(--red-glow);
            color: white;
        }

        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }

        /* Campos con iconos y toggle de contraseña */
        .field {
            position: relative;
            margin-bottom: 20px;
        }
        .field input {
            width: 100%;
            padding: 14px 40px 14px 40px; /* espacio para icono y ojo */
            background: var(--input-bg);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            outline: none;
            font-size: 16px;
            color: white;
            transition: 0.3s;
        }
        .field input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .field input:focus {
            border-bottom-color: var(--red-glow);
        }
        .field input.error {
            border-bottom-color: var(--error);
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            60% { transform: translateX(5px); }
            80% { transform: translateX(-3px); }
        }

        /* Iconos dentro de los inputs */
        .field .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            opacity: 0.6;
            pointer-events: none;
        }
        .field .input-icon svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: white;
            stroke-width: 2;
        }

        /* Toggle visibilidad contraseña */
        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
        }
        .toggle-password:hover {
            color: white;
        }
        .toggle-password svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* Indicador de fortaleza */
        .password-strength {
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
            border-radius: 2px;
        }
        .strength-text {
            font-size: 12px;
            margin-top: 4px;
            text-align: left;
            color: rgba(255,255,255,0.7);
        }

        /* Mensajes de validación por campo */
        .field-error {
            color: #ff6070;
            font-size: 12px;
            text-align: left;
            margin-top: 4px;
            display: none;
        }

        /* Botones */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--red), #7a000f);
            border: none;
            border-radius: 6px;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(192, 0, 26, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(192, 0, 26, 0.6);
        }
        .btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .btn.success {
            background: linear-gradient(135deg, #005525, #00ff88);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
        .btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .google-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 14px;
            box-shadow: none;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: none;
        }
        .google-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .google-btn .google-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            margin-right: 4px;
        }

        /* Mensajes generales con fade */
        .msg {
            margin: 15px 0 10px;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 5px;
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        .msg.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .msg.error {
            background: rgba(192, 0, 26, 0.2);
            border: 1px solid rgba(192, 0, 26, 0.5);
            color: #ff6070;
        }
        .msg.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--success);
        }

        .extra-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 13px;
        }
        .extra-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: 0.3s;
        }
        .extra-links a:hover {
            color: var(--red-glow);
        }
        .terms {
            font-size: 12px;
            margin-top: 15px;
            opacity: 0.7;
        }
        .terms a {
            color: inherit;
            text-decoration: underline;
        }

        /* Checkbox "Recordarme" */
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }
        .remember-row input[type="checkbox"] {
            accent-color: var(--red-glow);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Modal de recuperación */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: rgba(10,5,20,0.95);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 380px;
            color: white;
            text-align: center;
            position: relative;
        }

        /* Clase para lectores de pantalla */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }

        @media (max-width: 500px) {
            .main-container {
                padding: 1.5rem 5vw;
                justify-content: center;
            }
            .auth-panel {
                padding: 30px 20px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="main-container">
        <div class="auth-panel" role="main">
            <div class="logo">Gojo Satoru</div>
            <div class="subtitle">Sistema de autenticación</div>

            <!-- Pestañas (ahora botones accesibles) -->
            <div class="tabs" role="tablist">
                <button type="button" class="tab" id="tabLogin" role="tab" aria-selected="true" aria-controls="loginSection">Iniciar sesión</button>
                <button type="button" class="tab" id="tabRegister" role="tab" aria-selected="false" aria-controls="registerSection">Registrarse</button>
            </div>

            <!-- Sección de Login -->
            <div class="form-section active" id="loginSection" role="tabpanel" aria-labelledby="tabLogin">
                <!-- Email -->
                <div class="field">
                    <label for="emailInput" class="sr-only">Correo electrónico</label>
                    <span class="input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <input type="email" id="emailInput" placeholder="Email" autocomplete="email" aria-describedby="emailErrorMsg">
                    <div id="emailErrorMsg" class="field-error"></div>
                </div>
                <!-- Contraseña -->
                <div class="field">
                    <label for="pwInput" class="sr-only">Contraseña</label>
                    <span class="input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="pwInput" placeholder="Contraseña" autocomplete="current-password" aria-describedby="pwErrorMsg">
                    <button type="button" class="toggle-password" data-target="pwInput" aria-label="Mostrar contraseña">
                        <svg class="eye-closed" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        <svg class="eye-open" style="display:none" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                    <div id="pwErrorMsg" class="field-error"></div>
                </div>
                <div class="remember-row">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Recordarme</label>
                </div>
                <div class="msg error" id="loginError"></div>
                <div class="msg success" id="loginSuccess"></div>
                <button class="btn" id="loginBtn">
                    <span class="spinner" aria-hidden="true"></span>
                    <span class="btn-text">Ingresar</span>
                </button>
                <button class="btn google-btn" id="googleLoginBtn">
                    <span class="spinner" id="googleSpinner" aria-hidden="true"></span>
                    <span class="google-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>

            </div>

            <!-- Sección de Registro -->

                <div class="field">
                    <label for="regEmail" class="sr-only">Correo electrónico</label>
                    <span class="input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <input type="email" id="regEmail" placeholder="Email" autocomplete="email" aria-describedby="regEmailError">

                </div>
                <div class="field">
                    <label for="regPw" class="sr-only">Contraseña (mín. 6 caracteres)</label>
                    <span class="input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>

                    <button type="button" class="toggle-password" data-target="regPw" aria-label="Mostrar contraseña">

                    </button>
                    <div class="password-strength"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-text" id="strengthText"></div>
                    <div id="regPwError" class="field-error"></div>
                </div>
                <div class="field">
                    <label for="regPw2" class="sr-only">Confirmar contraseña</label>
                    <span class="input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="regPw2" placeholder="Confirmar contraseña" autocomplete="new-password" aria-describedby="regPw2Error">
                    <button type="button" class="toggle-password" data-target="regPw2" aria-label="Mostrar contraseña">
                        <svg class="eye-closed" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        <svg class="eye-open" style="display:none" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                    <div id="regPw2Error" class="field-error"></div>
                </div>
                <div class="msg error" id="regError"></div>
                <div class="msg success" id="regSuccess"></div>
                <button class="btn" id="registerBtn">
                    <span class="spinner" aria-hidden="true"></span>
                    <span class="btn-text">Crear cuenta</span>
                </button>
                <div class="extra-links">
                    <a href="#" id="toLoginLink">← Ya tengo cuenta</a>
                </div>
                <p class="terms">Al registrarte aceptas nuestros <a href="#" target="_blank">términos y condiciones</a>.</p>
            </div>
        </div>
    </div>

    <!-- Modal para restablecer contraseña -->
    <div id="resetModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="resetModalTitle">
        <div class="modal-content">
            <h3 id="resetModalTitle" style="font-family:'Cinzel',serif; margin-bottom:15px;">Recuperar acceso</h3>
            <p style="font-size:14px; margin-bottom:20px; opacity:0.8;">Te enviaremos un enlace para restablecer tu contraseña</p>
            <div class="field">
                <input type="email" id="resetEmail" placeholder="Tu email" autocomplete="email">

            <div id="resetMsg" style="min-height:20px; margin-bottom:15px;"></div>
            <button class="btn" id="sendResetBtn">
                <span class="spinner" aria-hidden="true"></span>
                <span class="btn-text">Enviar enlace</span>
            </button>
            <button style="background:none; border:none; color:white; margin-top:15px; cursor:pointer;" id="closeResetModal">Cancelar</button>
        </div>
    </div>

        (function() {

            function traducirError(error) {
                if (!error) return 'Error desconocido';
                const msg = error.message || error;
                if (msg.includes('Email not confirmed')) return 'Confirma tu correo antes de entrar';
                if (msg.includes('Too many')) return 'Demasiados intentos. Espera un minuto e inténtalo de nuevo';
                if (msg.includes('Invalid login credentials')) return 'Credenciales incorrectas';
                if (msg.includes('already registered') || msg.includes('User already registered')) return 'Este correo ya está registrado';
                if (msg.includes('network') || msg.includes('fetch')) return 'Sin conexión a internet';

            const loginBtnText = loginBtn.querySelector('.btn-text');
            const loginError = document.getElementById('loginError');
            const loginSuccess = document.getElementById('loginSuccess');
            const googleBtn = document.getElementById('googleLoginBtn');
            const googleSpinner = document.getElementById('googleSpinner');
            const googleText = document.getElementById('googleText');

            // Registro
            const regEmail = document.getElementById('regEmail');
            const regPw = document.getElementById('regPw');
            const regPw2 = document.getElementById('regPw2');
            const registerBtn = document.getElementById('registerBtn');
            const registerBtnSpinner = registerBtn.querySelector('.spinner');
            const registerBtnText = registerBtn.querySelector('.btn-text');
            const regError = document.getElementById('regError');
            const regSuccess = document.getElementById('regSuccess');

            // Restablecer
            const resetModal = document.getElementById('resetModal');
            const resetEmail = document.getElementById('resetEmail');
            const sendResetBtn = document.getElementById('sendResetBtn');
            const sendResetBtnSpinner = sendResetBtn.querySelector('.spinner');
            const sendResetBtnText = sendResetBtn.querySelector('.btn-text');
            const resetMsg = document.getElementById('resetMsg');
            const closeResetModalBtn = document.getElementById('closeResetModal');

            // Errores de campo
            const emailErrorMsg = document.getElementById('emailErrorMsg');
            const pwErrorMsg = document.getElementById('pwErrorMsg');
            const regEmailError = document.getElementById('regEmailError');
            const regPwError = document.getElementById('regPwError');
            const regPw2Error = document.getElementById('regPw2Error');
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');

            // ================== FUNCIONES AUXILIARES ==================
            function esEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

            function setButtonLoading(btn, spinner, textEl, loadingText) {
                btn.classList.add('loading');
                spinner.style.display = 'inline-block';
                textEl.textContent = loadingText;
            }
            function resetButton(btn, spinner, textEl, originalText) {
                btn.classList.remove('loading', 'success');
                spinner.style.display = 'none';
                textEl.textContent = originalText;
            }

            function mostrarMensaje(elemento, msg, tipo) {
                elemento.textContent = (tipo === 'error' ? '⚠ ' : '✓ ') + msg;
                elemento.className = 'msg ' + tipo + ' visible';
                // Ocultar automáticamente después de 5s para mensajes de éxito
                if (tipo === 'success') {
                    setTimeout(() => {
                        if (elemento.textContent.startsWith('✓ ')) {
                            elemento.classList.remove('visible');
                        }
                    }, 5000);
                }
            }
            function ocultarMensaje(elemento) {
                elemento.classList.remove('visible');
            }

            function limpiarMensajes() {
                ocultarMensaje(loginError);
                ocultarMensaje(loginSuccess);
                ocultarMensaje(regError);
                ocultarMensaje(regSuccess);
                // Limpiar errores de campo
                [emailErrorMsg, pwErrorMsg, regEmailError, regPwError, regPw2Error].forEach(el => el.style.display = 'none');
                strengthFill.style.width = '0%';
                strengthText.textContent = '';
            }

            function mostrarErrorCampo(el, msg) {
                el.textContent = msg;
                el.style.display = 'block';
            }
            function ocultarErrorCampo(el) {
                el.style.display = 'none';
            }

            // Validación en tiempo real (blur)
            emailInput.addEventListener('blur', () => {
                const val = emailInput.value.trim();
                if (val && !esEmail(val)) mostrarErrorCampo(emailErrorMsg, 'Correo inválido');
                else ocultarErrorCampo(emailErrorMsg);
            });
            emailInput.addEventListener('input', () => ocultarErrorCampo(emailErrorMsg));

            pwInput.addEventListener('blur', () => {
                if (pwInput.value.length > 0 && pwInput.value.length < 1) { /* nada */ }
                ocultarErrorCampo(pwErrorMsg);
            });

            regEmail.addEventListener('blur', () => {
                const val = regEmail.value.trim();
                if (val && !esEmail(val)) mostrarErrorCampo(regEmailError, 'Correo inválido');
                else ocultarErrorCampo(regEmailError);
            });
            regEmail.addEventListener('input', () => ocultarErrorCampo(regEmailError));

            // Fortaleza de contraseña en registro
            function evaluarFortaleza(pw) {
                let score = 0;
                if (pw.length >= 6) score++;
                if (pw.length >= 10) score++;
                if (/[A-Z]/.test(pw)) score++;
                if (/[0-9]/.test(pw)) score++;
                if (/[^A-Za-z0-9]/.test(pw)) score++;
                return score;
            }

            regPw.addEventListener('input', () => {
                const pw = regPw.value;
                const score = evaluarFortaleza(pw);
                let width = 0, color = '', texto = '';
                if (pw.length === 0) {
                    width = 0; color = ''; texto = '';
                } else if (score <= 1) {
                    width = 25; color = '#ff0028'; texto = 'Débil';
                } else if (score <= 2) {
                    width = 50; color = '#ffaa00'; texto = 'Media';
                } else if (score <= 3) {
                    width = 75; color = '#aacc00'; texto = 'Buena';
                } else {
                    width = 100; color = '#00ff88'; texto = 'Fuerte';
                }
                strengthFill.style.width = width + '%';
                strengthFill.style.background = color;
                strengthText.textContent = texto;
                // Validar longitud
                if (pw.length > 0 && pw.length < 6) {
                    mostrarErrorCampo(regPwError, 'Mínimo 6 caracteres');
                } else {
                    ocultarErrorCampo(regPwError);
                }
            });

            regPw2.addEventListener('input', () => {
                if (regPw2.value && regPw2.value !== regPw.value) {
                    mostrarErrorCampo(regPw2Error, 'Las contraseñas no coinciden');
                } else {
                    ocultarErrorCampo(regPw2Error);
                }
            });

            // ================== CAMBIO DE PESTAÑAS ==================
            function setActiveTab(tab) {
                if (tab === 'login') {
                    loginSection.classList.add('active');
                    registerSection.classList.remove('active');
                    tabLogin.setAttribute('aria-selected', 'true');
                    tabRegister.setAttribute('aria-selected', 'false');
                    limpiarMensajes();
                } else {
                    registerSection.classList.add('active');
                    loginSection.classList.remove('active');
                    tabRegister.setAttribute('aria-selected', 'true');
                    tabLogin.setAttribute('aria-selected', 'false');
                    limpiarMensajes();
                }
            }

            tabLogin.addEventListener('click', () => setActiveTab('login'));
            tabRegister.addEventListener('click', () => setActiveTab('register'));
            document.getElementById('toRegisterLink').addEventListener('click', (e) => { e.preventDefault(); setActiveTab('register'); });
            document.getElementById('toLoginLink').addEventListener('click', (e) => { e.preventDefault(); setActiveTab('login'); });

            // Toggle visibilidad contraseña
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    const isPassword = input.type === 'password';
                    input.type = isPassword ? 'text' : 'password';
                    btn.querySelector('.eye-closed').style.display = isPassword ? 'none' : '';
                    btn.querySelector('.eye-open').style.display = isPassword ? '' : 'none';
                    btn.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');
                });
            });

            // ================== MODAL RECUPERACIÓN ==================
            function abrirModal() {
                resetModal.classList.add('active');
                resetEmail.focus();
                document.addEventListener('keydown', cerrarModalConEscape);
            }
            function cerrarModal() {
                resetModal.classList.remove('active');
                document.removeEventListener('keydown', cerrarModalConEscape);
                document.getElementById('forgotLink').focus();
            }
            function cerrarModalConEscape(e) {
                if (e.key === 'Escape') cerrarModal();
            }

            document.getElementById('forgotLink').addEventListener('click', (e) => {
                e.preventDefault();
                resetEmail.value = emailInput.value;
                resetMsg.innerHTML = '';
                resetButton(sendResetBtn, sendResetBtnSpinner, sendResetBtnText, 'Enviar enlace');
                sendResetBtn.style.display = '';
                abrirModal();
            });
            closeResetModalBtn.addEventListener('click', cerrarModal);
            resetModal.addEventListener('click', (e) => { if (e.target === resetModal) cerrarModal(); });

            sendResetBtn.addEventListener('click', async () => {
                const email = resetEmail.value.trim();
                if (!esEmail(email)) {
                    resetMsg.innerHTML = '<span style="color:#ff6070;">⚠ Correo inválido</span>';
                    return;
                }
                setButtonLoading(sendResetBtn, sendResetBtnSpinner, sendResetBtnText, 'Enviando…');
                try {
                    const { error } = await sb.auth.resetPasswordForEmail(email, {
                        redirectTo: 'https://shadowwarden098.github.io/Easy/index.html'
                    });
                    if (error) throw error;
                    resetMsg.innerHTML = '<span style="color:#00ff88;">✓ Enlace enviado a ' + email + '</span>';
                    sendResetBtn.style.display = 'none';
                } catch (err) {
                    resetButton(sendResetBtn, sendResetBtnSpinner, sendResetBtnText, 'Enviar enlace');
                    resetMsg.innerHTML = '<span style="color:#ff6070;">⚠ ' + traducirError(err) + '</span>';
                }
            });

            // ================== LOGIN ==================
            loginBtn.addEventListener('click', async () => {
                const email = emailInput.value.trim();
                const pw = pwInput.value;
                limpiarMensajes();

                if (!email || !pw) {
                    mostrarMensaje(loginError, 'Completa todos los campos', 'error');
                    return;
                }
                if (!esEmail(email)) {
                    mostrarMensaje(loginError, 'Correo inválido', 'error');
                    return;
                }

                setButtonLoading(loginBtn, loginBtnSpinner, loginBtnText, 'Verificando…');
                try {
                    const { data, error } = await sb.auth.signInWithPassword({
                        email,
                        password: pw,
                        options: { shouldCreatePersistentSession: rememberMe.checked }
                    });
                    if (error) throw error;
                    resetButton(loginBtn, loginBtnSpinner, loginBtnText, 'Ingresar');
                    loginBtn.classList.add('success');
                    loginBtnText.textContent = '✓ ¡Acceso concedido!';
                    let countdown = 3;
                    const redirigir = () => {
                        loginSuccess.textContent = `✓ Redirigiendo en ${countdown}...`;
                        if (countdown <= 0) window.location.href = 'dashboard.html';
                        else setTimeout(() => { countdown--; redirigir(); }, 1000);
                    };
                    mostrarMensaje(loginSuccess, 'Redirigiendo…', 'success');
                    redirigir();
                } catch (err) {
                    resetButton(loginBtn, loginBtnSpinner, loginBtnText, 'Ingresar');
                    const msg = traducirError(err);
                    mostrarMensaje(loginError, msg, 'error');
                    // Si error es de email no confirmado, mostrar enlace para reenviar
                    if (err.message && err.message.includes('Email not confirmed')) {
                        // Agregar botón dinámico debajo del error
                        let resendBtn = document.getElementById('resendConfirmation');
                        if (!resendBtn) {
                            resendBtn = document.createElement('button');
                            resendBtn.id = 'resendConfirmation';
                            resendBtn.textContent = 'Reenviar correo de confirmación';
                            resendBtn.style.cssText = 'background:none; border:none; color:#ffaa00; text-decoration:underline; cursor:pointer; margin-top:8px;';
                            resendBtn.addEventListener('click', async () => {
                                try {
                                    await sb.auth.resend({ type: 'signup', email });
                                    mostrarMensaje(loginSuccess, 'Correo reenviado. Revisa tu bandeja de entrada.', 'success');
                                } catch (e) {
                                    mostrarMensaje(loginError, traducirError(e), 'error');
                                }
                            });
                            loginError.insertAdjacentElement('afterend', resendBtn);
                        }
                    } else {
                        const existingResend = document.getElementById('resendConfirmation');
                        if (existingResend) existingResend.remove();
                    }
                }
            });

            // ================== GOOGLE OAUTH ==================
            googleBtn.addEventListener('click', async () => {
                googleText.style.display = 'none';
                googleSpinner.style.display = 'inline-block';
                try {
                    const { error } = await sb.auth.signInWithOAuth({
                        provider: 'google',
                        options: { redirectTo: 'https://shadowwarden098.github.io/Easy/dashboard.html' }
                    });
                    if (error) throw error;
                } catch (err) {
                    googleText.style.display = 'inline';
                    googleSpinner.style.display = 'none';
                    mostrarMensaje(loginError, 'Error al conectar con Google', 'error');
                }
            });

            // ================== REGISTRO ==================
            registerBtn.addEventListener('click', async () => {
                const email = regEmail.value.trim();
                const pw = regPw.value;
                const pw2 = regPw2.value;
                limpiarMensajes();

                let valido = true;
                if (!esEmail(email)) { mostrarErrorCampo(regEmailError, 'Correo inválido'); valido = false; }
                if (pw.length < 6) { mostrarErrorCampo(regPwError, 'Mínimo 6 caracteres'); valido = false; }
                if (pw !== pw2) { mostrarErrorCampo(regPw2Error, 'Las contraseñas no coinciden'); valido = false; }
                if (!valido) return;

                setButtonLoading(registerBtn, registerBtnSpinner, registerBtnText, 'Creando…');
                try {
                    const { data, error } = await sb.auth.signUp({ email, password: pw });
                    if (error) throw error;
                    resetButton(registerBtn, registerBtnSpinner, registerBtnText, 'Crear cuenta');
                    const necesitaConfirmar = data.user && !data.session;
                    const msg = necesitaConfirmar ? '✓ Revisa tu bandeja de entrada para confirmar' : '✓ ¡Cuenta creada! Ya puedes iniciar sesión';
                    mostrarMensaje(regSuccess, msg, 'success');
                    if (!necesitaConfirmar) {
                        setTimeout(() => {
                            setActiveTab('login');
                            emailInput.value = email;
                        }, 2500);
                    }
                } catch (err) {
                    resetButton(registerBtn, registerBtnSpinner, registerBtnText, 'Crear cuenta');
                    mostrarMensaje(regError, traducirError(err), 'error');
                }
            });

            // ================== SESIÓN EXISTENTE ==================
            sb.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    resetButton(loginBtn, loginBtnSpinner, loginBtnText, 'Ingresar');
                    loginBtn.classList.add('success');
                    loginBtnText.textContent = '✓ ¡Acceso concedido!';
                    mostrarMensaje(loginSuccess, 'Sesión activa detectada', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                }
            });

            limpiarMensajes();
        })();
    </script>
</body>
</html>
