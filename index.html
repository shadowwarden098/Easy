<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow Garden — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #070510;
            --red: #c0001a;
            --red-glow: #ff0028;
            --purple: #4a0080;
            --purple-light: #9b30ff;
            --card: rgba(10, 5, 20, 0.88);
            --border: rgba(192, 0, 26, 0.3);
            --border-p: rgba(155, 48, 255, 0.25);
            --text: #f0e8ff;
            --text-dim: #9988bb;
            --input-bg: rgba(255, 255, 255, 0.04);
            --success: #00ff88;
            --error: #ff0028;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            min-height: 100%;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            color: var(--text);
        }

        .bg-art {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(to right, rgba(7, 5, 16, 0.97) 0%, rgba(7, 5, 16, 0.65) 45%, rgba(7, 5, 16, 0.25) 100%),
                linear-gradient(to bottom, rgba(7, 5, 16, 0.5) 0%, transparent 30%, transparent 70%, rgba(7, 5, 16, 0.8) 100%),
                url('https://i.imgur.com/8k9XJHF.jpeg') center/cover no-repeat;
            filter: saturate(1.4) contrast(1.1) brightness(0.9);
        }
        .bg-fallback {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 75% 50%, rgba(74, 0, 128, 0.6) 0%, rgba(192, 0, 26, 0.2) 40%, rgba(7, 5, 16, 1) 75%);
        }

        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(192, 0, 26, 0.9), transparent);
            animation: pFloat linear infinite;
            filter: blur(1px);
        }
        @keyframes pFloat {
            0% {
                transform: translateY(110vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: .8;
            }
            90% {
                opacity: .3;
            }
            100% {
                transform: translateY(-10vh) scale(1.3) rotate(360deg);
                opacity: 0;
            }
        }

        .ink {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0.055;
            font-size: 160px;
            font-weight: 900;
            color: #c0001a;
            line-height: 1;
            user-select: none;
            font-family: 'Cinzel', serif;
        }
        .ink-1 {
            top: -10px;
            right: -5px;
            transform: rotate(12deg);
        }
        .ink-2 {
            bottom: 8%;
            left: -15px;
            transform: rotate(-8deg);
            font-size: 110px;
            color: #4a0080;
            opacity: 0.07;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.035) 2px, rgba(0, 0, 0, 0.035) 4px);
        }
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(80, 0, 10, 0.45) 100%);
        }

        .stage {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 16px;
        }

        /* Personaje Shadow */
        .cid-wrap {
            position: fixed;
            right: -10px;
            bottom: 0;
            width: 52vw;
            max-width: 360px;
            height: 100vh;
            z-index: 5;
            pointer-events: none;
            transition: transform .6s cubic-bezier(.34, 1.2, .64, 1), filter .4s ease;
            transform-origin: bottom right;
            filter: drop-shadow(0 0 12px rgba(155, 48, 255, 0.35)) drop-shadow(0 0 25px rgba(192, 0, 26, 0.2));
        }
        .cid-wrap.idle {
            animation: cidFloat 4s ease-in-out infinite;
        }
        @keyframes cidFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-10px) rotate(.8deg);
            }
        }
        .cid-wrap.peek {
            animation: none;
            transform: translateX(-18px) translateY(-6px);
        }
        .cid-wrap.covering {
            animation: none;
            transform: translateX(50px) rotate(4deg);
            filter: drop-shadow(0 0 10px rgba(155, 48, 255, 0.25)) brightness(.65);
        }
        .cid-wrap.disgust {
            animation: cidShake .5s ease;
        }
        @keyframes cidShake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-10px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-6px);
            }
            80% {
                transform: translateX(5px);
            }
        }
        .cid-wrap.success {
            animation: cidWin 1s cubic-bezier(.34, 1.56, .64, 1) forwards;
            filter: drop-shadow(0 0 18px rgba(0, 255, 136, 0.45)) drop-shadow(0 0 35px rgba(0, 255, 136, 0.25));
        }
        @keyframes cidWin {
            0% {
                transform: scale(1) translateY(0);
            }
            40% {
                transform: scale(1.07) translateY(-18px);
            }
            70% {
                transform: scale(1.04) translateY(-9px);
            }
            100% {
                transform: scale(1.05) translateY(-12px);
            }
        }

        .cid-aura {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 180px;
            background: radial-gradient(ellipse at bottom, rgba(155, 48, 255, 0.55) 0%, rgba(74, 0, 128, 0.15) 35%, transparent 70%);
            filter: blur(18px);
            animation: auraBreath 2.4s ease-in-out infinite, auraHue 5s ease infinite alternate;
        }
        @keyframes auraBreath {
            0%,
            100% {
                opacity: .6;
                transform: translateX(-50%) scaleX(1);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scaleX(1.12);
            }
        }
        @keyframes auraHue {
            0% {
                background: radial-gradient(ellipse at bottom, rgba(155, 48, 255, 0.55) 0%, rgba(74, 0, 128, 0.15) 35%, transparent 70%);
            }
            100% {
                background: radial-gradient(ellipse at bottom, rgba(192, 0, 26, 0.4) 0%, rgba(155, 48, 255, 0.2) 35%, transparent 70%);
            }
        }
        .cid-svg {
            width: 100%;
            height: 100%;
        }

        .speech-bubble {
            position: fixed;
            right: calc(50vw + 20px);
            top: 28%;
            background: rgba(10, 5, 20, .93);
            border: 1px solid var(--border);
            border-radius: 14px 14px 4px 14px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            box-shadow: 0 0 18px rgba(192, 0, 26, .3);
            z-index: 20;
            opacity: 0;
            transform: translateY(5px) scale(.93);
            transition: opacity .25s, transform .3s cubic-bezier(.34, 1.56, .64, 1);
            max-width: 180px;
            text-align: center;
        }
        .speech-bubble.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 8px;
            width: 10px;
            height: 10px;
            background: rgba(10, 5, 20, .93);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            transform: rotate(45deg);
        }

        .card {
            width: 100%;
            max-width: 370px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px 18px 18px 4px;
            box-shadow: 0 0 0 1px rgba(192, 0, 26, .08), 0 28px 70px rgba(0, 0, 0, .8), inset 0 1px 0 rgba(255, 255, 255, .03);
            padding: 30px 26px 34px;
            position: relative;
            overflow: hidden;
            animation: cardIn .7s cubic-bezier(.34, 1.2, .64, 1) both;
            backdrop-filter: blur(22px);
        }
        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateX(-38px) scale(.95);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, transparent, var(--red), var(--purple-light), transparent);
            animation: barShimmer 3s ease-in-out infinite;
        }
        @keyframes barShimmer {
            0%,
            100% {
                opacity: .45;
            }
            50% {
                opacity: 1;
            }
        }
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--red-glow), var(--purple-light), transparent);
            animation: topLine 3s ease-in-out infinite;
        }
        @keyframes topLine {
            0%,
            100% {
                opacity: .25;
            }
            50% {
                opacity: .85;
            }
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-symbol {
            font-size: 32px;
            display: block;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 14px rgba(192, 0, 26, .9));
            animation: logoGlow 2s ease-in-out infinite alternate;
        }
        @keyframes logoGlow {
            from {
                filter: drop-shadow(0 0 7px rgba(192, 0, 26, .6));
            }
            to {
                filter: drop-shadow(0 0 20px rgba(155, 48, 255, .9));
            }
        }
        .logo-title {
            font-family: 'Cinzel', serif;
            font-size: 19px;
            font-weight: 900;
            letter-spacing: .18em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff4060, #c0001a, #9b30ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-sub {
            font-size: 9px;
            letter-spacing: .28em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 3px;
        }

        .tabs {
            display: flex;
            margin-bottom: 22px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 9px;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: pointer;
            transition: color .2s, border-bottom .2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .tab.active {
            color: var(--red-glow);
            border-bottom-color: var(--red-glow);
        }

        .field {
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(10px);
        }
        .field.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity .4s ease, transform .4s cubic-bezier(.34, 1.56, .64, 1);
        }
        .field-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .field-label::before {
            content: '';
            width: 10px;
            height: 1px;
            background: var(--red);
            opacity: .55;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap input {
            width: 100%;
            padding: 11px 13px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color .25s, box-shadow .25s, background .25s;
            caret-color: var(--red-glow);
        }
        .input-wrap input::placeholder {
            color: rgba(153, 136, 187, .35);
        }
        .input-wrap input:focus {
            border-color: var(--red-glow);
            background: rgba(192, 0, 26, .05);
            box-shadow: 0 0 0 3px rgba(192, 0, 26, .1);
        }
        .input-wrap input.err {
            border-color: var(--error);
            animation: shake .4s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-5px);
            }
            60% {
                transform: translateX(5px);
            }
            80% {
                transform: translateX(-3px);
            }
        }
        .input-glow {
            position: absolute;
            bottom: -1px;
            left: 8px;
            right: 8px;
            height: 1px;
            border-radius: 1px;
            background: linear-gradient(90deg, var(--red), var(--purple-light));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .3s ease;
            pointer-events: none;
        }
        .input-wrap input:focus~.input-glow {
            transform: scaleX(1);
        }
        .eye-btn {
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-dim);
            padding: 4px;
            transition: color .2s;
        }
        .eye-btn:hover {
            color: var(--red-glow);
        }
        .pw-bar {
            height: 2px;
            border-radius: 2px;
            background: rgba(255, 255, 255, .05);
            margin-top: 4px;
            overflow: hidden;
            display: none;
        }
        .pw-fill {
            height: 100%;
            border-radius: 2px;
            width: 0%;
            transition: width .4s ease, background .4s ease;
        }

        .msg {
            border-radius: 5px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
            display: none;
            animation: slideDown .3s ease;
        }
        .msg.error {
            background: rgba(192, 0, 26, .1);
            border: 1px solid rgba(192, 0, 26, .35);
            color: #ff6070;
        }
        .msg.success {
            background: rgba(0, 255, 136, .07);
            border: 1px solid rgba(0, 255, 136, .22);
            color: var(--success);
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .extras {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity .35s;
        }
        .extras.visible {
            opacity: 1;
        }
        .check-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
        }
        .check-label input[type=checkbox] {
            accent-color: var(--red-glow);
            width: 12px;
            height: 12px;
        }
        .forgot {
            font-size: 11px;
            color: var(--red-glow);
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
            transition: opacity .2s;
        }
        .forgot:hover {
            opacity: .7;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--red) 0%, #7a000f 50%, var(--red) 100%);
            background-size: 200% 100%;
            border: none;
            border-radius: 5px;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform .15s, box-shadow .2s, opacity .35s;
            box-shadow: 0 4px 22px rgba(192, 0, 26, .4), 0 0 0 1px rgba(192, 0, 26, .28);
            opacity: 0;
        }
        .btn-main.visible {
            opacity: 1;
        }
        .btn-main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, .1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity .2s;
        }
        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 28px rgba(192, 0, 26, .6), 0 0 0 1px var(--red-glow);
        }
        .btn-main:hover::before {
            opacity: 1;
        }
        .btn-main:active {
            transform: translateY(0);
        }
        .btn-main.success {
            background: linear-gradient(135deg, #005525, #00ff88 50%, #005525);
            background-size: 200% 100%;
            box-shadow: 0 4px 22px rgba(0, 255, 136, .4);
        }
        .btn-main.loading {
            pointer-events: none;
            animation: btnShimmer 1s linear infinite;
        }
        @keyframes btnShimmer {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 9px;
            margin: 12px 0;
            color: var(--text-dim);
            font-size: 9px;
            letter-spacing: .1em;
